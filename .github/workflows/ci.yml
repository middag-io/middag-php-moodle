name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

# CI uses no private infrastructure and no credentials. This adapter builds on
# the OSS middag-io/* packages (framework, ui) and the michaelmeneses/moodle-stubs
# dev dependency, all resolved from public Composer registries (Packagist).

jobs:
  quality:
    name: Static analysis & style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish --no-check-lock

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Test namespaces follow PSR-4 (autoload + autoload-dev)
        run: composer dump-autoload --optimize --strict-psr

      - name: PHPStan + PHP-CS-Fixer + Rector (dry-run)
        run: composer check

  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: PHPUnit
        run: composer test

  # LB-CI-01: PHPStan against every supported Moodle stubs series (4.5→5.2).
  # Informative (continue-on-error) until the per-version compat modelling
  # (cm_info/modinfo/navigation_node class_alias) lands — the canonical
  # series stays blocking in the quality job.
  stan-matrix:
    name: PHPStan (moodle-stubs ${{ matrix.stubs }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        stubs: ['~4.5.0', '~5.1.0', '~5.2.0']
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Pin moodle-stubs to the matrix series
        run: composer require --dev "michaelmeneses/moodle-stubs:${{ matrix.stubs }}" --with-all-dependencies --no-interaction

      - name: PHPStan against the matrix stubs
        run: composer check:stan

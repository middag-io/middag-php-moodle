name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

# CI uses no private infrastructure and no credentials. This adapter builds on
# the OSS middag-io/* packages (framework, ui) and the michaelmeneses/moodle-stubs
# dev dependency, all resolved from public Composer registries (Packagist).

jobs:
  quality:
    name: Static analysis & style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish --no-check-lock

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Test namespaces follow PSR-4 (autoload + autoload-dev)
        run: composer dump-autoload --optimize --strict-psr

      - name: PHPStan + PHP-CS-Fixer + Rector (dry-run)
        run: composer check

  # No composer.lock is committed (library convention): each cell resolves
  # dependencies on its own PHP line. On 8.2/8.3 Composer must land on the
  # Symfony 7.x line (Symfony 8.x requires PHP >= 8.4.1); on 8.4 it may pick
  # Symfony 8.x. Moodle 4.5 hosts cap PHP at 8.3, so the 8.3 cell is what
  # proves the lib still installs there — the assertions below keep a future
  # constraint drift from silently masking the ^8.2 floor.
  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Assert the resolved vendor satisfies this cell's platform
        run: composer check-platform-reqs

      - name: Assert Symfony resolved on the 7.x line (PHP 8.2/8.3 floor)
        if: matrix.php != '8.4'
        run: |
          composer show symfony/http-foundation | grep -E '^versions +: +\* v?7\.'

      - name: PHPUnit
        run: composer test

  # LB-CI-01: PHPStan against every supported Moodle stubs series (4.5→5.2).
  # Blocking: all four series (4.5 / 5.0 / 5.1 / 5.2) analyse clean at L6, so
  # the per-version class_alias shims (cm_info/modinfo/navigation_node) are
  # now backed by matrix evidence rather than manual reasoning. The canonical
  # series (~5.0) is also enforced in the quality job; keeping it here makes
  # the per-version coverage explicit.
  stan-matrix:
    name: PHPStan (moodle-stubs ${{ matrix.stubs }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stubs: ['~4.5.0', '~5.0.0', '~5.1.0', '~5.2.0']
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Pin moodle-stubs to the matrix series
        run: composer require --dev "michaelmeneses/moodle-stubs:${{ matrix.stubs }}" --with-all-dependencies --no-interaction

      - name: PHPStan against the matrix stubs
        run: composer check:stan
